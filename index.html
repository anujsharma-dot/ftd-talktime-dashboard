<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Backend API
    const API_BASE_URL = 'https://ftd-dashboard-backend.anuj-sharma.workers.dev';

    const PASSWORD = "Megha@5678";

    function App() {
        const [activeTab, setActiveTab] = useState('user-report');
        const [showPasswordModal, setShowPasswordModal] = useState(false);
        const [isUploadUnlocked, setIsUploadUnlocked] = useState(false);
        const [password, setPassword] = useState('');
        const [passwordError, setPasswordError] = useState('');

        const [mappingFile, setMappingFile] = useState(null);
        const [cdrFile, setCdrFile] = useState(null);
        const [productivityFile, setProductivityFile] = useState(null);

        const [mappingData, setMappingData] = useState([]);
        const [cdrData, setCdrData] = useState([]);
        const [productivityData, setProductivityData] = useState([]);

        const [reportData, setReportData] = useState([]);
        const [filteredUserData, setFilteredUserData] = useState([]);
        const [tlReportData, setTlReportData] = useState([]);
        const [userFilters, setUserFilters] = useState({});
        const [columnSorts, setColumnSorts] = useState({});
        const [lastUpdated, setLastUpdated] = useState('');
        const [processing, setProcessing] = useState(false);
        const [error, setError] = useState('');
        const [statusBar, setStatusBar] = useState({ type: '', message: '' });

        const chartRefs = useRef({});
        const chartInstances = useRef({});
        const passwordInputRef = useRef(null);

        const handleUploadClick = (e) => {
            if (!isUploadUnlocked) {
                e.preventDefault();
                setShowPasswordModal(true);
                setTimeout(() => passwordInputRef.current?.focus(), 100);
            }
        };

        const handlePasswordSubmit = () => {
            if (password === PASSWORD) {
                setIsUploadUnlocked(true);
                setShowPasswordModal(false);
                setPasswordError('');
                setPassword('');
                setStatusBar({ type: 'ok', message: 'Upload unlocked. You can now select files.' });
            } else {
                setPasswordError('Incorrect password');
            }
        };

        // Backend functions
        const saveToBackend = async (reportData, tlReportData, lastUpdated) => {
            try {
                await fetch(`${API_BASE_URL}/api/save-report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reportData, tlReportData, lastUpdated })
                });
            } catch (e) { console.log('Save skipped'); }
        };

        const loadFromBackend = async () => {
            try {
                const res = await fetch(`${API_BASE_URL}/api/get-report`);
                const data = await res.json();
                if (data.success && data.reportData) {
                    setReportData(data.reportData);
                    setFilteredUserData(data.reportData);
                    setTlReportData(data.tlReportData);
                    setLastUpdated(data.lastUpdated);
                    setActiveTab('user-report');
                }
            } catch (e) { }
        };

        useEffect(() => { loadFromBackend(); }, []);

        const handleFileUpload = (file, setFile, setData) => {
            if (!file) return;
            setFile(file);
            Papa.parse(file, {
                complete: (results) => setData(results.data),
                header: true,
                skipEmptyLines: true,
                transformHeader: (h) => h.trim()
            });
        };

        const findColumn = (headers, possibleNames) => {
            const lowerHeaders = headers.map(h => h.toLowerCase().trim());
            for (let name of possibleNames) {
                const idx = lowerHeaders.findIndex(h => h.includes(name.toLowerCase()));
                if (idx !== -1) return headers[idx];
            }
            return null;
        };

        const cleanAgentUsername = (username) => {
            if (!username) return '';
            return String(username).replace(/_agent$/i, '').trim();
        };

        const parseTimeToSeconds = (timeStr) => {
            if (!timeStr) return 0;
            const parts = String(timeStr).trim().split(':');
            if (parts.length !== 3) return 0;
            return (parseInt(parts[0]) || 0) * 3600 + (parseInt(parts[1]) || 0) * 60 + (parseInt(parts[2]) || 0);
        };

        const secondsToTimeFormat = (seconds) => {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        };

        const formatDateTime = () => {
            const now = new Date();
            const date = now.toLocaleDateString('en-GB');
            const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            return `${date} ${time}`;
        };

        const processData = () => {
            setProcessing(true);
            setError('');
            setStatusBar({ type: 'info', message: 'Processing files...' });

            try {
                if (!mappingData.length || !cdrData.length || !productivityData.length) {
                    setError('Please upload all three files');
                    setStatusBar({ type: 'err', message: 'Missing files' });
                    setProcessing(false);
                    return;
                }

                const mappingHeaders = Object.keys(mappingData[0]);
                const cdrHeaders = Object.keys(cdrData[0]);
                const productivityHeaders = Object.keys(productivityData[0]);

                const cdrAgentCol = findColumn(cdrHeaders, ['agent username', 'emp_code', 'username']);
                const cdrCallStatusCol = findColumn(cdrHeaders, ['call status']);
                const cdrDurationCol = findColumn(cdrHeaders, ['duration']);

                const prodAgentCol = findColumn(productivityHeaders, ['agent username', 'emp_code', 'username']);
                const mappingUserCodeCol = findColumn(mappingHeaders, ['user code', 'emp_code']);
                const mappingUnitCol = findColumn(mappingHeaders, ['unit']);
                const mappingTLCol = findColumn(mappingHeaders, ['team leader name', 'tl name']);
                const mappingUserNameCol = findColumn(mappingHeaders, ['user name', 'name']);
                const mappingStatusCol = findColumn(mappingHeaders, ['active status', 'status']);
                const mappingDOJCol = findColumn(mappingHeaders, ['doj']);

                if (!cdrAgentCol || !prodAgentCol || !mappingUserCodeCol) {
                    setError('Required columns not found');
                    setStatusBar({ type: 'err', message: 'Column mapping failed' });
                    setProcessing(false);
                    return;
                }

                const cdrAggregated = {};
                cdrData.forEach(row => {
                    const agent = cleanAgentUsername(row[cdrAgentCol]);
                    if (!agent) return;

                    const agentLower = String(agent).toLowerCase();
                    if (agentLower.includes('agent') || agentLower.includes('username') || agentLower.includes('emp')) return;

                    const callStatus = String(row[cdrCallStatusCol] || '').toLowerCase().trim();
                    if (callStatus.includes('call status') || callStatus.includes('status')) return;

                    if (!cdrAggregated[agent]) {
                        cdrAggregated[agent] = { totalDial: 0, totalConnected: 0, totalTalktime: 0 };
                    }

                    cdrAggregated[agent].totalDial++;

                    if (callStatus === 'connected call') {
                        cdrAggregated[agent].totalConnected++;
                    }

                    const durationSeconds = parseTimeToSeconds(row[cdrDurationCol]);
                    cdrAggregated[agent].totalTalktime += durationSeconds;
                });

                const productivityIndex = {};
                productivityData.forEach(row => {
                    const agent = cleanAgentUsername(row[prodAgentCol]);
                    if (!agent) return;
                    
                    const agentLower = String(agent).toLowerCase();
                    if (agentLower.includes('agent') || agentLower.includes('username') || agentLower.includes('emp')) return;
                    
                    productivityIndex[agent] = row;
                });

                const userReport = mappingData
                    .filter(mapRow => {
                        const userCode = String(mapRow[mappingUserCodeCol] || '').trim();
                        const userCodeLower = userCode.toLowerCase();
                        if (!userCode || userCodeLower.includes('user') || userCodeLower.includes('code') || userCodeLower.includes('emp')) {
                            return false;
                        }
                        return true;
                    })
                    .map(mapRow => {
                    const userCode = String(mapRow[mappingUserCodeCol] || '').trim();
                    const cdrInfo = cdrAggregated[userCode] || { totalDial: 0, totalConnected: 0, totalTalktime: 0 };
                    const prodInfo = productivityIndex[userCode] || {};

                    const totalTalktimeSeconds = Math.round(cdrInfo.totalTalktime);
                    const status = totalTalktimeSeconds >= 3600 ? 'Above 1 Hr' : 'Below 1 Hr';

                    return {
                        unit: mapRow[mappingUnitCol] || '',
                        teamLeaderName: mapRow[mappingTLCol] || '',
                        userCode: userCode,
                        userName: mapRow[mappingUserNameCol] || '',
                        activeStatus: mapRow[mappingStatusCol] || '',
                        doj: mapRow[mappingDOJCol] || '',
                        totalDial: cdrInfo.totalDial,
                        totalConnectedCalls: cdrInfo.totalConnected,
                        totalTalktimeSeconds: totalTalktimeSeconds,
                        totalTalktime: secondsToTimeFormat(totalTalktimeSeconds),
                        status: status,
                        loginDuration: prodInfo['Login-Duration'] || '0',
                        netLoginDuration: prodInfo['Net Login Duration'] || '0',
                        totalBreakTime: prodInfo['Total Break Time'] || '0',
                        bioBreak: prodInfo['Bio Break'] || '0',
                        lunchBreak: prodInfo['Lunch Break'] || '0',
                        tlMeetingBreak: prodInfo['TLMeeting Break'] || '0',
                        meetingBreak: prodInfo['Meeting Break'] || '0',
                        otherBreak: prodInfo['Other Break'] || '0',
                        phoneBreak: prodInfo['Phone Break'] || '0',
                        processBreak: prodInfo['Process Break'] || '0',
                        refreshBreak: prodInfo['Refresh Break'] || '0',
                        teaBreak: prodInfo['Tea Break'] || '0',
                        xmlBreak: prodInfo['XML Break'] || '0',
                        totalNonProductiveBreak: prodInfo['Total Non-productive Break Duration'] || '0',
                        totalProductiveBreak: prodInfo['Total Productive Break Duration'] || '0'
                    };
                });

                const tlAggregated = {};
                userReport.forEach(row => {
                    const key = `${row.unit}|${row.teamLeaderName}`;
                    if (!tlAggregated[key]) {
                        tlAggregated[key] = {
                            unit: row.unit,
                            tlName: row.teamLeaderName,
                            userCount: 0,
                            totalDial: 0,
                            totalConnected: 0,
                            totalTT: 0
                        };

                    tlAggregated[key].userCount++;
                    tlAggregated[key].totalDial += row.totalDial;
                    tlAggregated[key].totalConnected += row.totalConnectedCalls;
                    tlAggregated[key].totalTT += row.totalTalktimeSeconds;
                });

                const tlReport = Object.values(tlAggregated).map(tl => ({
                    ...tl,
                    avgDial: (tl.totalDial / tl.userCount).toFixed(1),
                    avgConn: (tl.totalConnected / tl.userCount).toFixed(1),
                    avgTT: secondsToTimeFormat(Math.round(tl.totalTT / tl.userCount)),
                    totalTTFormatted: secondsToTimeFormat(tl.totalTT)
                }));

                setReportData(userReport);
                setFilteredUserData(userReport);
                setTlReportData(tlReport);
                setUserFilters({});
                setColumnSorts({});

                setLastUpdated(timestamp);

                setActiveTab('user-report');
                setProcessing(false);
                saveToBackend(userReport, tlReport, timestamp);

                if (order && order !== 'All') {
                    filtered = [...filtered].sort((a, b) => {
                        let aVal = a[col];
                        let bVal = b[col];

                        // Handle numeric fields
                        if (col === 'totalDial' || col === 'totalConnectedCalls' || col === 'totalTalktimeSeconds') {
                            aVal = Number(aVal) || 0;
                            bVal = Number(bVal) || 0;
                        }
                        // Handle time fields (HH:MM:SS format)
                        else if (col.includes('Break') || col.includes('Duration') || col === 'loginDuration' || col === 'netLoginDuration' || col === 'totalBreakTime') {
                            aVal = parseTimeToSeconds(aVal);
                            bVal = parseTimeToSeconds(bVal);
                        }

                        if (order === 'Low to High') {
                            return aVal > bVal ? 1 : -1;
                        } else {
                            return aVal < bVal ? 1 : -1;
                        }

                    <div className={`section ${activeTab === 'tl-report' ? 'active' : ''}`}>

                                                const best = [...tlReportData].sort((a, b) => {

                                        </div>

                                        </div>
                                        <div className="label" style={{fontSize: '11px'}}>
                                            {(() => {

                                            })()}

                                        <div className="value" style={{fontSize: '28px'}}>
                                            {(() => {
                                                const best = [...tlReportData].sort((a, b) => b.userCount - a.userCount)[0];
                                                return best ? best.userCount : '-';
                                            })()}
                                        </div>
                                        <div className="label" style={{fontSize: '11px'}}>
                                            {(() => {

                                    </div>

                                    <div key={unit} className="unit-section">

                                                            <th><div className="th-content"><span className="th-label">Total Connected</span></div></th>
                                                            <th><div className="th-content"><span className="th-label">Conn %</span></div></th>
                                                            <th><div className="th-content"><span className="th-label">Total TT</span></div></th>
                                                            <th><div className="th-content"><span className="th-label">Avg Dial</span></div></th>

                                            </div>
                                        </div>
                                    </div>

                <div className={`modal-overlay ${showPasswordModal ? 'show' : ''}`} onClick={() => setShowPasswordModal(false)}>

                            value={password}

                        <button className="btn btn-blue" onClick={handlePasswordSubmit}>Unlock</button>
                    </div>
                </div>
            </>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
